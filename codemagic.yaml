workflows:
  ios-workflow:
    name: iOS Build
    environment:
      xcode: latest
      cocoapods: default
      node: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.daverosenfeld.glance

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project use-profiles --project App.xcodeproj
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --archive-xcargs "CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=GU77253GJF"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
