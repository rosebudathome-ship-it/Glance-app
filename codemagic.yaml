workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      xcode: latest
      node: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.daverosenfeld.glance

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/App/App.xcodeproj

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-flags="-allowProvisioningUpdates CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=GU77253GJF PROVISIONING_PROFILE_SPECIFIER=glance-appstore CODE_SIGN_IDENTITY='Apple Distribution'"

    artifacts:
      - ios/App/build/**/*.ipa
