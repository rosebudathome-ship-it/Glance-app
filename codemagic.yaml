workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      xcode: latest
      cocoapods: default
      node: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.daverosenfeld.glance

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Set signing and build IPA
        script: |
          cd ios/App
          xcode-project use-profiles
          xcode-project build-ipa --workspace App.xcworkspace --scheme App

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ipa/*.ipa
