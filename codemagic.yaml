workflows:
  ios-testflight:
    name: iOS TestFlight (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.glance.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.glance.app"
        MIN_IOS_BUILD_NUMBER: "8"
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install -g bun
          bun install
      - name: Build web assets
        script: |
          bun run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Install CocoaPods (if Podfile exists)
        script: |
          if [ -f ios/App/Podfile ]; then
            cd ios/App && pod install
          fi
      - name: Set iOS build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEW_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          if [ "$NEW_BUILD_NUMBER" -lt "$MIN_IOS_BUILD_NUMBER" ]; then
            NEW_BUILD_NUMBER="$MIN_IOS_BUILD_NUMBER"
          fi
          echo "Setting build number to $NEW_BUILD_NUMBER"
          cd ios/App
          agvtool new-version -all $NEW_BUILD_NUMBER
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build ipa
        script: |
          if [ -f ios/App/App.xcworkspace/contents.xcworkspacedata ]; then
            xcode-project build-ipa \
              --workspace "$XCODE_WORKSPACE" \
              --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa \
              --project "$XCODE_PROJECT" \
              --scheme "$XCODE_SCHEME"
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app.dSYM.zip
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
